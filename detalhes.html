<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Imóvel</title>

  <!-- Meta tags dinâmicas para SEO -->
  <meta name="description" content="">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <main>
    <div id="status"></div>
    <div id="detalhes"></div>
  </main>

  <script>
    const API_URL = "https://crm-app-1028879773485.southamerica-east1.run.app";

    function formatarPrecoBRL(valor){
      if(!valor) return "";
      return String(valor); // já vem formatado da API
    }

    function escaparHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    async function carregarDetalhes(){
      const statusEl = document.querySelector("#status");
      const detalhesEl = document.querySelector("#detalhes");

      const params = new URLSearchParams(window.location.search);
      const arquivo = params.get("id"); // Ex.: studio-venda-florianopolis-sc-plantas-inteligentes-v505.html

      if(!arquivo){
        statusEl.textContent = "Imóvel não informado na URL.";
        return;
      }

      try{
        statusEl.textContent = "Carregando…";
        const resp = await fetch(`${API_URL}/api/imoveis/publicados`);
        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const imoveis = await resp.json();
        const imovel = imoveis.find(i => i.urlPublicada === `/${arquivo}` || i.urlPublicada === `/${arquivo}`);

        if(!imovel){
          statusEl.textContent = "Imóvel não encontrado.";
          return;
        }

        const titulo = escaparHtml(imovel?.titulo || "Imóvel");
        const descricao = escaparHtml(imovel?.descricao || "");
        const valor = formatarPrecoBRL(imovel?.valor);
        const imagem = Array.isArray(imovel?.fotos) && imovel.fotos.length > 0 ? imovel.fotos[0] : "";

        const bairro = imovel?.bairro ?? "";
        const cidade = imovel?.cidade ?? "";
        const tipo = imovel?.tipo ?? "";
        const endereco = imovel?.endereco ?? "";

        statusEl.textContent = "";

        // 🔹 Atualizar meta tags para SEO
        document.title = titulo;
        document.querySelector('meta[name="description"]').setAttribute("content", descricao);
        document.querySelector('meta[property="og:title"]').setAttribute("content", titulo);
        document.querySelector('meta[property="og:description"]').setAttribute("content", descricao);
        if(imagem) document.querySelector('meta[property="og:image"]').setAttribute("content", imagem);
        document.querySelector('meta[property="og:url"]').setAttribute("content", window.location.href);

        // 🔹 Renderizar conteúdo
        detalhesEl.innerHTML = `
          <h2 style="margin:0;color:#a67c52">${titulo}</h2>
          ${imagem ? `<img class="foto" src="${imagem}" alt="Foto do imóvel" onerror="this.src='https://img1.wsimg.com/isteam/ip/07e23903-74f7-4959-8978-9a8be272f898/Logo%20Flavia%20Marca%20dagua%20dourada.png'">` : ""}
          ${descricao ? `<p>${descricao}</p>` : ""}
          ${valor ? `<p><strong>Valor:</strong> ${valor}</p>` : ""}

          <div class="grid">
            ${tipo ? `<div class="item"><strong>Tipo:</strong> ${escaparHtml(tipo)}</div>` : ""}
            ${endereco ? `<div class="item"><strong>Endereço:</strong> ${escaparHtml(endereco)}</div>` : ""}
            ${(bairro || cidade) ? `<div class="item"><strong>Localização:</strong> ${escaparHtml([bairro,cidade].filter(Boolean).join(", "))}</div>` : ""}
          </div>

          <div class="acoes">
            <a class="btn" href="index.html">Voltar</a>
            <a class="btn btn-whats" href="https://wa.me/5548999600601" target="_blank" rel="noopener">Falar no WhatsApp</a>
          </div>
        `;
      }catch(e){
        console.error(e);
        statusEl.textContent = "Não foi possível carregar os detalhes deste imóvel agora.";
      }
    }

    carregarDetalhes();
  </script>
</body>
</html>
