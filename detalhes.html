<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes do Imóvel | Flavia Capacia Corretora</title>
  <style>
    :root{
      --fundo-branco:#ffffff;
      --texto-bronze:#4B3A2F;
      --bronze-claro:#7A5C45;
      --dourado:#b08d57;
      --fonte-padrao:'Playfair Display', serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--fundo-branco);color:var(--texto-bronze);font-family:var(--fonte-padrao);line-height:1.6}
    header{padding:16px 20px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
    header a{color:var(--texto-bronze);text-decoration:none;font-weight:700}
    header a:hover{color:var(--dourado)}
    main{max-width:1100px;margin:0 auto;padding:26px 20px 50px}
    h1{margin:0 0 12px;color:var(--dourado);font-size:2rem}
    .status{color:var(--bronze-claro);margin:8px 0 18px}
    .card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
    .foto{width:100%;height:420px;object-fit:cover;border-radius:8px;display:block;margin:12px 0 16px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 16px;margin-top:12px}
    .item{padding:10px;border:1px solid #eee;border-radius:8px;background:#fafafa}
    .acoes{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:700;border:1px solid var(--dourado);color:var(--dourado);background:#fff}
    .btn:hover{background:var(--dourado);color:#fff}
    .btn-whats{border-color:#25D366;color:#128C7E}
    .btn-whats:hover{background:#25D366;color:#fff}
    @media (max-width:800px){.foto{height:300px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <a href="index.html">← Voltar para a Home</a>
    <a href="https://wa.me/5548999600601" target="_blank" rel="noopener">Falar no WhatsApp</a>
  </header>

  <main>
    <h1>Detalhes do Imóvel</h1>
    <p class="status" id="status">Carregando…</p>
    <div id="detalhes" class="card"></div>
  </main>
<script>
  const API_URL = "https://crm-app-1028879773485.southamerica-east1.run.app";

  function formatarPrecoBRL(valor){
    if(valor === null || valor === undefined || valor === "") return "";
    const n = Number(valor);
    if(Number.isNaN(n)) return String(valor);
    return n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  }

  function escaparHtml(str){
    return String(str ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function carregarDetalhes(){
    const statusEl = document.querySelector("#status");
    const detalhesEl = document.querySelector("#detalhes");

    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("id"); // agora 'id' será o código (ex.: V500)

    if(!codigo){
      statusEl.textContent = "Código do imóvel não informado na URL. Ex.: detalhes.html?id=V500";
      detalhesEl.innerHTML = "";
      return;
    }

    try{
      statusEl.textContent = "Carregando…";
      const resp = await fetch(`${API_URL}/api/imoveis/publicos?codigo=${encodeURIComponent(codigo)}`);
      if(!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const imovel = await resp.json();

      const titulo = escaparHtml(imovel?.titulo || "Imóvel");
      const descricao = escaparHtml(imovel?.descricao || "");
      const preco = formatarPrecoBRL(imovel?.preco);
      const imagem = Array.isArray(imovel?.imagens) && imovel.imagens[0] ? imovel.imagens[0] : "";

      const area = imovel?.area ?? "";
      const quartos = imovel?.quartos ?? "";
      const suites = imovel?.suites ?? "";
      const vagas = imovel?.vagas ?? "";
      const bairro = imovel?.bairro ?? "";
      const cidade = imovel?.cidade ?? "";

      statusEl.textContent = "";

      detalhesEl.innerHTML = `
        <h2 style="margin:0;color:var(--texto-bronze)">${titulo}</h2>
        ${imagem ? `<img class="foto" src="${imagem}" alt="Foto do imóvel">` : ""}
        ${descricao ? `<p>${descricao}</p>` : ""}
        ${preco ? `<p><strong>Preço:</strong> ${preco}</p>` : ""}

        <div class="grid">
          ${area !== "" ? `<div class="item"><strong>Área:</strong> ${escaparHtml(area)} m²</div>` : ""}
          ${quartos !== "" ? `<div class="item"><strong>Quartos:</strong> ${escaparHtml(quartos)}</div>` : ""}
          ${suites !== "" ? `<div class="item"><strong>Suítes:</strong> ${escaparHtml(suites)}</div>` : ""}
          ${vagas !== "" ? `<div class="item"><strong>Vagas:</strong> ${escaparHtml(vagas)}</div>` : ""}
          ${(bairro || cidade) ? `<div class="item"><strong>Localização:</strong> ${escaparHtml([bairro,cidade].filter(Boolean).join(", "))}</div>` : ""}
        </div>

        <div class="acoes">
          <a class="btn" href="index.html">Voltar</a>
          <a class="btn btn-whats" href="https://wa.me/5548999600601" target="_blank" rel="noopener">Falar no WhatsApp</a>
        </div>
      `;
    }catch(e){
      console.error(e);
      statusEl.textContent = "Não foi possível carregar os detalhes deste imóvel agora. Tente novamente mais tarde.";
      detalhesEl.innerHTML = "";
    }
  }

  carregarDetalhes();
</script>

</body>
</html>
