<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>FloripaMoradia | Elizete Colella Corretora - Imóveis em Florianópolis</title>
  <meta name="description" content="Imóveis em Pedra Branca, Palhoça e Grande Florianópolis. Apartamentos, casas e terrenos com a corretora Elizete Colella." />
  
  <meta property="og:title" content="FloripaMoradia | Elizete Colella Corretora" />
  <meta property="og:description" content="Encontre seu imóvel em Pedra Branca, Palhoça e Grande Florianópolis" />
  <meta property="og:url" content="https://floripamoradia.com.br" />
  <meta property="og:type" content="website" />
  
  <link rel="canonical" href="https://floripamoradia.com.br/index.html" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      /* Paleta Azul Marinho - igual arquivo sobre Flavia Capacia */
      --azul-escuro: #002855;
      --azul-principal: #003D73;
      --azul-medio: #0052A3;
      --azul-claro: #E8F1F8;
      --vermelho: #D32F2F;
      --vermelho-escuro: #B71C1C;
      --vermelho-hover: #E53935;
      --cinza-escuro: #2C3E50;
      --cinza-medio: #546E7A;
      --cinza-claro: #ECEFF1;
      --texto-escuro: #263238;
      --texto-medio: #546E7A;
      --branco: #FFFFFF;
      --sombra: rgba(0, 40, 85, 0.1);
      --sombra-hover: rgba(211, 47, 47, 0.15);
      --fonte-principal: 'Roboto', sans-serif;
      --fonte-secundaria: 'Open Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--fonte-principal);
      color: var(--texto-escuro);
      line-height: 1.6;
      background-color: #F8F9FA;
    }

    /* ========== BARRA TOPO ========== */
    .top-bar {
      background-color: var(--azul-escuro);
      color: white;
      padding: 8px 0;
      font-size: 13px;
    }

    .top-bar-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .top-bar-contact {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .top-bar-contact a {
      color: white;
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .top-bar-contact a:hover { opacity: 0.8; }

    /* ========== HEADER PRINCIPAL ========== */
    .main-header {
      background-color: var(--branco);
      box-shadow: 0 2px 10px var(--sombra);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--azul-principal), var(--azul-medio));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .logo-text-container {
      display: flex;
      flex-direction: column;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--azul-principal);
      font-family: var(--fonte-secundaria);
      letter-spacing: -0.5px;
    }

    .logo-subtitle {
      font-size: 12px;
      color: var(--texto-medio);
      font-weight: 400;
    }

    .nav-menu ul {
      display: flex;
      list-style: none;
      gap: 8px;
      align-items: center;
    }

    .nav-menu a {
      text-decoration: none;
      color: var(--texto-escuro);
      font-weight: 600;
      font-size: 14px;
      padding: 10px 16px;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.3s;
    }

    .nav-menu a:hover {
      background-color: var(--azul-claro);
      color: var(--azul-principal);
    }

    /* ========== HERO COM IMAGEM ========== */
    .hero-image-section {
      position: relative;
      height: 500px;
      background: linear-gradient(rgba(0, 40, 85, 0.6), rgba(0, 40, 85, 0.6)), 
                  url('https://images.unsplash.com/photo-1609137144813-7d9921338f24?w=1600&h=800&fit=crop') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero-image-content {
      max-width: 1200px;
      padding: 0 20px;
      width: 100%;
    }

    .hero-image-content h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 30px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    }

    .hero-tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .hero-tab {
      background-color: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      color: white;
      padding: 12px 35px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
    }

    .hero-tab.active,
    .hero-tab:hover {
      background-color: white;
      color: var(--azul-principal);
    }

    .hero-search-advanced {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      max-width: 900px;
      margin: 0 auto;
    }

    .search-input-main {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #DDD;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 18px;
    }

    .search-filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .search-filters select,
    .search-filters input {
      padding: 12px 16px;
      border: 1px solid #DDD;
      border-radius: 6px;
      font-size: 14px;
    }

    .search-btn-main {
      width: 100%;
      padding: 16px;
      background-color: var(--vermelho);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background-color 0.3s;
    }

    .search-btn-main:hover {
      background-color: var(--vermelho-hover);
    }

    /* ========== BREADCRUMB ========== */
    .breadcrumb-bar {
      background-color: var(--branco);
      padding: 12px 0;
      border-bottom: 1px solid #E0E0E0;
    }

    .breadcrumb-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      font-size: 13px;
      color: var(--texto-medio);
    }

    .breadcrumb-content a {
      color: var(--azul-medio);
      text-decoration: none;
    }

    .breadcrumb-content a:hover {
      text-decoration: underline;
    }

    /* ========== CONTAINER PRINCIPAL ========== */
    .main-content {
      max-width: 1200px;
      margin: 45px auto;
      padding: 0 20px;
    }

    .section-header {
      margin-bottom: 35px;
      text-align: center;
    }

    .section-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--azul-principal);
      margin-bottom: 8px;
    }

    .section-subtitle {
      font-size: 16px;
      color: var(--texto-medio);
    }

    /* ========== FILTROS AVANÇADOS - PREPARADO PARA API ========== */
    .filter-section {
      /* display: none; */ /* Descomente para ocultar após integração API */
      background: var(--branco);
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 3px 12px var(--sombra);
      margin-bottom: 35px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 18px;
      align-items: end;
    }

    .filter-item label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--texto-medio);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-item select,
    .filter-item input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #DDD;
      border-radius: 6px;
      font-size: 14px;
    }

    .filter-btn {
      padding: 11px 30px;
      background-color: var(--vermelho);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: background-color 0.3s;
    }

    .filter-btn:hover {
      background-color: var(--vermelho-hover);
    }

    /* ========== GRID IMÓVEIS - PREPARADO PARA API ========== */
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      margin-bottom: 50px;
    }

    .property-card {
      background: var(--branco);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 12px var(--sombra);
      transition: all 0.3s;
      position: relative;
    }

    .property-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px var(--sombra-hover);
    }

    .property-tag {
      position: absolute;
      top: 15px;
      right: 15px;
      background-color: var(--vermelho);
      color: white;
      padding: 6px 14px;
      border-radius: 25px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      z-index: 10;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    .property-image {
      width: 100%;
      height: 230px;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .property-card:hover .property-image {
      transform: scale(1.06);
    }

    .property-details {
      padding: 22px;
    }

    .property-type {
      font-size: 12px;
      color: var(--azul-medio);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .property-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--texto-escuro);
      margin-bottom: 10px;
      line-height: 1.3;
      min-height: 50px;
    }

    .property-location {
      font-size: 13px;
      color: var(--texto-medio);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .property-features {
      display: flex;
      gap: 18px;
      padding: 16px 0;
      border-top: 1px solid #E0E0E0;
      border-bottom: 1px solid #E0E0E0;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--texto-medio);
    }

    .feature-item strong {
      color: var(--texto-escuro);
      font-weight: 600;
    }

    .property-price {
      font-size: 26px;
      font-weight: 700;
      color: var(--vermelho);
      margin-bottom: 18px;
    }

    .property-actions {
      display: flex;
      gap: 10px;
    }

    .btn-details {
      flex: 1;
      padding: 13px;
      background-color: var(--azul-principal);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      transition: background-color 0.3s;
    }

    .btn-details:hover {
      background-color: var(--azul-medio);
    }

    .btn-whats {
      padding: 13px 22px;
      background-color: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
      transition: background-color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-whats:hover {
      background-color: #128C7E;
    }

    /* ========== WHATSAPP FLUTUANTE ========== */
    .whatsapp-float {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background-color: #25D366;
      color: white;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 5px 18px rgba(37, 211, 102, 0.5);
      z-index: 998;
      text-decoration: none;
      transition: all 0.3s;
    }

    .whatsapp-float:hover {
      background-color: #128C7E;
      transform: scale(1.12);
    }

    /* ========== FOOTER ========== */
    .main-footer {
      background: linear-gradient(135deg, var(--azul-escuro), var(--azul-principal));
      color: white;
      padding: 55px 20px 25px;
      margin-top: 70px;
    }

    .footer-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 45px;
      margin-bottom: 35px;
    }

      font-size: 19px;
      font*
