
<script>
// contact-backend-handler
document.addEventListener("DOMContentLoaded", () => {
  const forms = document.querySelectorAll('form#contatoForm, form.form-captacao');
  if (!forms.length) return;

  forms.forEach((form) => {
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      e.stopImmediatePropagation();

      const submitEl = form.querySelector('input[type="submit"], button[type="submit"]');
      if (submitEl) submitEl.disabled = true;

      let msgEl = form.querySelector(".form-msg");
      if (!msgEl) {
        msgEl = document.createElement("div");
        msgEl.className = "form-msg";
        msgEl.style.marginTop = "10px";
        msgEl.style.fontSize = "0.95rem";
        form.appendChild(msgEl);
      }
      msgEl.textContent = "Enviando...";
      msgEl.style.color = "#333";

      const formData = new FormData(form);
      const data = {
        nome: formData.get("nome") || "",
        telefone: formData.get("telefone") || "",
        email: formData.get("email") || "",
        mensagem: formData.get("mensagem") || "",
        data: new Date().toLocaleString("pt-BR")
      };

      fetch("http://localhost:5000/salvar-contato", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
        .then((resp) => {
          if (!resp.ok) throw new Error("request-failed");
          return resp.json().catch(() => ({}));
        })
        .then(() => {
          msgEl.textContent = "Mensagem enviada com sucesso!";
          msgEl.style.color = "green";
          form.reset();
        })
        .catch(() => {
          msgEl.textContent = "Erro ao enviar. Tente novamente.";
          msgEl.style.color = "red";
        })
        .finally(() => {
          if (submitEl) submitEl.disabled = false;
        });
    }, true);
  });
});
</script>
